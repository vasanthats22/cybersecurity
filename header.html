<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Stackly · Header</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ===== GLOBAL RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            color: #1e2a41;
            overflow-x: hidden;
            width: 100%;
            padding-top: 110px;
            min-height: 100vh;
        }

        html {
            overflow-x: hidden;
            width: 100%;
        }

        /* ===== HEADER - LIGHT + TWO‑COLOR (BLUE & GOLD) ===== */
        .header {
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0, 20, 40, 0.06);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            width: 100%;
            border-bottom: 3px solid #d4a843;  /* gold accent */
            transition: all 0.3s ease;
        }

        .header.scrolled {
            box-shadow: 0 8px 30px rgba(212, 168, 67, 0.12);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 110px;
            gap: 30px;
            width: 100%;
        }

        /* ===== LOGO ===== */
        .logo-area {
            display: flex;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            flex-shrink: 0;
        }

        .logo-area:hover {
            opacity: 0.85;
        }

        .logo-area img {
            height: 110px;
            width: auto;
            max-width: 170px;
            object-fit: contain;
            display: block;
            transition: transform 0.3s;
        }

        .logo-area:hover img {
            transform: scale(1.04);
        }

        /* ===== NAVIGATION ===== */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 36px;
            flex: 1;
            justify-content: center;
        }

        .nav-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 16px;
            font-weight: 700;
            color: #2d3a52;
            cursor: pointer;
            transition: color 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn i {
            color: #2563eb;   /* blue */
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            color: #d4a843;   /* gold on hover */
        }

        .nav-btn.active {
            color: #d4a843;   /* gold active */
        }

        .nav-btn.active i {
            color: #d4a843;
        }

        /* ===== RIGHT ACTIONS ===== */
        .right-actions {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .login-btn {
            background: transparent;
            border: 2px solid #2563eb;
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #2563eb;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .login-btn:hover {
            background: #2563eb;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.20);
            border-color: #2563eb;
        }

        .getstarted-btn {
            background: #d4a843;   /* gold primary */
            border: none;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            box-shadow: 0 4px 20px rgba(212, 168, 67, 0.25);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .getstarted-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 168, 67, 0.35);
            background: #c49a3d;
        }

        /* ===== HAMBURGER ===== */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            padding: 8px;
            background: transparent;
            border: none;
            z-index: 1001;
        }

        .hamburger span {
            width: 28px;
            height: 2.5px;
            background: #1e2a41;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
            background: #d4a843;
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
            background: #d4a843;
        }

        /* ===== MOBILE MENU ===== */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100vh;
            background: #ffffff;
            z-index: 999;
            transition: left 0.4s ease-in-out;
            overflow-y: auto;
            padding-top: 120px;
        }

        .mobile-menu.active {
            left: 0;
        }

        .mobile-nav-buttons {
            display: flex;
            flex-direction: column;
            padding: 20px 24px;
            gap: 16px;
        }

        .mobile-nav-btn {
            background: none;
            border: none;
            padding: 12px 0;
            font-size: 18px;
            font-weight: 600;
            color: #1e2a41;
            cursor: pointer;
            transition: color 0.2s;
            text-align: left;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }

        .mobile-nav-btn i {
            width: 28px;
            color: #2563eb;
            font-size: 20px;
        }

        .mobile-nav-btn:hover {
            color: #d4a843;
        }

        .mobile-nav-btn.active-mobile {
            color: #d4a843;
        }

        .mobile-nav-btn.active-mobile i {
            color: #d4a843;
        }

        .mobile-actions {
            display: none;
            flex-direction: column;
            gap: 15px;
            padding: 20px 24px;
            margin-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
        }

        .mobile-login-btn {
            background: transparent;
            border: 2px solid #2563eb;
            border-radius: 30px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #2563eb;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .mobile-login-btn:hover {
            background: #2563eb;
            color: #ffffff;
        }

        .mobile-getstarted-btn {
            background: #d4a843;
            border: none;
            border-radius: 30px;
            padding: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(212, 168, 67, 0.25);
        }

        .mobile-getstarted-btn:hover {
            background: #c49a3d;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 168, 67, 0.35);
        }

        /* ===== RESPONSIVE ===== */

        @media (max-width: 1200px) {
            .nav-links {
                gap: 20px;
            }
            .nav-btn {
                font-size: 14px;
            }
            .header-container {
                padding: 0 24px;
                gap: 20px;
            }
        }

        @media (max-width: 1024px) {
            .nav-links {
                gap: 16px;
            }
            .nav-btn {
                font-size: 13px;
            }
            .login-btn {
                padding: 6px 14px;
                font-size: 0.7rem;
            }
            .getstarted-btn {
                padding: 6px 14px;
                font-size: 0.7rem;
            }
            .header-container {
                height: 100px;
                padding: 0 20px;
            }
            body {
                padding-top: 100px;
            }
            .logo-area img {
                height: 80px;
                max-width: 150px;
            }
        }

        @media (max-width: 850px) {
            .header-container {
                padding: 0 16px;
                height: 90px;
                gap: 12px;
            }
            body {
                padding-top: 90px;
            }

            .nav-links {
                display: none;
            }
            .right-actions .login-btn {
                display: none;
            }
            .right-actions .getstarted-btn {
                display: none;
            }
            .hamburger {
                display: flex;
            }
            .mobile-actions {
                display: flex;
            }

            .logo-area img {
                height: 80px;
                max-width: 160px;
            }
        }

        @media (max-width: 480px) {
            .header-container {
                height: 80px;
                padding: 0 12px;
                gap: 8px;
            }
            body {
                padding-top: 80px;
            }
            
            .logo-area img {
                height: 95px;
                max-width: 140px;
            }

            .mobile-menu {
                padding-top: 100px;
            }
            .mobile-nav-btn {
                font-size: 16px;
                padding: 10px 0;
            }
            .mobile-nav-btn i {
                font-size: 18px;
            }
            .mobile-login-btn, .mobile-getstarted-btn {
                font-size: 0.9rem;
                padding: 12px;
            }
            .hamburger span {
                width: 24px;
                height: 2px;
            }
            .hamburger {
                gap: 5px;
                padding: 6px;
            }
        }

        @media (max-width: 380px) {
            .header-container {
                height: 72px;
                padding: 0 10px;
                gap: 6px;
            }
            body {
                padding-top: 72px;
            }
            .logo-area img {
                height: 65px;
                max-width: 120px;
            }
            .hamburger span {
                width: 20px;
                height: 2px;
            }
            .hamburger {
                gap: 4px;
                padding: 4px;
            }
            .mobile-nav-btn {
                font-size: 14px;
                padding: 8px 0;
            }
            .mobile-nav-btn i {
                font-size: 16px;
                width: 24px;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e9edf3;
        }
        ::-webkit-scrollbar-thumb {
            background: #d4a843;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c49a3d;
        }

        /* ===== DEMO CONTENT ===== */
        .demo-content {
            max-width: 1200px;
            margin: 80px auto 40px;
            padding: 0 24px;
            text-align: center;
        }

        .demo-content h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1e2a41;
            margin-bottom: 12px;
        }

        .demo-content p {
            font-size: 1.1rem;
            color: #4b5a73;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.7;
        }

        .color-swatch {
            display: inline-flex;
            gap: 20px;
            margin-top: 30px;
            padding: 20px 30px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        .swatch {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e2a41;
        }

        .swatch .color-box {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
        }

        .color-box.blue { background: #2563eb; }
        .color-box.gold { background: #d4a843; }
        .color-box.white { background: #ffffff; }
        .color-box.light-bg { background: #f0f4f8; }

        /* ============================================
           PAGE INDICATOR
           ============================================ */
        .page-indicator {
            display: inline-block;
            background: #d4a843;
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header" id="header">
        <div class="header-container">
            <a href="index.html" class="logo-area">
                <img src="Stackly.webp" alt="Stackly" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%2290%22 viewBox=%220 0 200 90%22%3E%3Crect width=%22200%22 height=%2290%22 fill=%22%23ffffff%22 rx=%2212%22 stroke=%22%232563eb%22 stroke-width=%221.5%22/%3E%3Ctext x=%2220%22 y=%2254%22 font-family=%22Inter, sans-serif%22 font-size=%2226%22 font-weight=%22800%22 fill=%22%232563eb%22%3E🔐 Stackly%3C/text%3E%3C/svg%3E'">
            </a>

            <nav class="nav-links">
                <button class="nav-btn active" data-page="home"><i class="fas fa-shield-halved"></i> Home</button>
                <button class="nav-btn" data-page="services"><i class="fas fa-bolt"></i> Services</button>
                <button class="nav-btn" data-page="monitoring"><i class="fas fa-satellite-dish"></i> Monitoring</button>
                <button class="nav-btn" data-page="threat-intel"><i class="fas fa-bug"></i> Threat Intel</button>
                <button class="nav-btn" data-page="contact"><i class="fas fa-lock"></i> Contact</button>
            </nav>

            <div class="right-actions">
                <button class="login-btn" id="loginBtn"><i class="fas fa-user-astronaut"></i> Login</button>
                <button class="getstarted-btn" id="getStartedBtn"><i class="fas fa-rocket"></i> Secure Now</button>
                <button class="hamburger" id="hamburgerBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- ===== MOBILE MENU ===== -->
    <div class="mobile-menu" id="mobileMenu">
        <div class="mobile-nav-buttons">
            <button class="mobile-nav-btn active-mobile" data-page="home"><i class="fas fa-shield-halved"></i> Home</button>
            <button class="mobile-nav-btn" data-page="services"><i class="fas fa-bolt"></i> Services</button>
            <button class="mobile-nav-btn" data-page="monitoring"><i class="fas fa-satellite-dish"></i> Monitoring</button>
            <button class="mobile-nav-btn" data-page="threat-intel"><i class="fas fa-bug"></i> Threat Intel</button>
            <button class="mobile-nav-btn" data-page="contact"><i class="fas fa-lock"></i> Contact</button>
        </div>
        
        <div class="mobile-actions">
            <button class="mobile-login-btn" id="mobileLoginBtn"><i class="fas fa-user-astronaut"></i> Login</button>
            <button class="mobile-getstarted-btn" id="mobileGetStartedBtn"><i class="fas fa-rocket"></i> Secure Now</button>
        </div>
    </div>

    <!-- ===== SCRIPT ===== -->
    <script>
        (function() {
            // ===== PAGE URLS =====
            const pageUrls = {
                home: 'home.html',
                services: 'services.html',
                monitoring: 'monitoring.html',
                'threat-intel': 'threat-intel.html',
                contact: 'contact.html'
            };

            // ===== NAVIGATION FUNCTION =====
            function navigateTo(page) {
                const url = pageUrls[page];
                if (url) {
                    window.location.href = url;
                } else {
                    alert('Navigating to: ' + page + '.html (demo)');
                }
            }

            // ===== DESKTOP NAVIGATION BUTTONS =====
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const page = this.getAttribute('data-page');
                    if (page) {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        navigateTo(page);
                    }
                });
            });

            // ===== MOBILE NAVIGATION BUTTONS =====
            document.querySelectorAll('.mobile-nav-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const page = this.getAttribute('data-page');
                    if (page) {
                        document.querySelectorAll('.mobile-nav-btn').forEach(b => b.classList.remove('active-mobile'));
                        this.classList.add('active-mobile');
                        navigateTo(page);
                        closeMobileMenu();
                    }
                });
            });

            // ===== DESKTOP LOGIN =====
            const loginBtn = document.getElementById('loginBtn');
            if (loginBtn) {
                loginBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = 'login.html';
                });
            }

            // ===== DESKTOP GET STARTED =====
            const getStartedBtn = document.getElementById('getStartedBtn');
            if (getStartedBtn) {
                getStartedBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = 'signup.html';
                });
            }

            // ===== MOBILE LOGIN =====
            const mobileLoginBtn = document.getElementById('mobileLoginBtn');
            if (mobileLoginBtn) {
                mobileLoginBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = 'login.html';
                });
            }

            // ===== MOBILE GET STARTED =====
            const mobileGetStartedBtn = document.getElementById('mobileGetStartedBtn');
            if (mobileGetStartedBtn) {
                mobileGetStartedBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = 'signup.html';
                });
            }

            // ===== LOGO CLICK =====
            const logoSection = document.querySelector('.logo-area');
            if (logoSection) {
                logoSection.addEventListener('click', function(e) {
                    e.preventDefault();
                    window.location.href = 'index.html';
                });
            }

            // ===== MOBILE MENU TOGGLE =====
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const mobileMenu = document.getElementById('mobileMenu');

            function toggleMobileMenu() {
                if (hamburgerBtn) hamburgerBtn.classList.toggle('active');
                if (mobileMenu) mobileMenu.classList.toggle('active');
                document.body.style.overflow = mobileMenu && mobileMenu.classList.contains('active') ? 'hidden' : '';
            }

            function closeMobileMenu() {
                if (hamburgerBtn) hamburgerBtn.classList.remove('active');
                if (mobileMenu) mobileMenu.classList.remove('active');
                document.body.style.overflow = '';
            }

            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', toggleMobileMenu);
            }

            // ===== CLOSE ON OUTSIDE CLICK =====
            document.addEventListener('click', function(e) {
                if (mobileMenu && mobileMenu.classList.contains('active')) {
                    if (!hamburgerBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
                        closeMobileMenu();
                    }
                }
            });

            // ===== CLOSE ON RESIZE =====
            window.addEventListener('resize', function() {
                if (window.innerWidth > 850) {
                    closeMobileMenu();
                }
            });

            // ===== CLOSE ON ESC =====
            window.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeMobileMenu();
                }
            });

            // ===== SCROLL SHADOW =====
            const header = document.getElementById('header');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });

            console.log('🛡️ Stackly · Header Loaded');
            console.log('📍 Available pages: Home, Services, Monitoring, Threat-Intel, Contact');
        })();
    </script>

</body>
</html>
